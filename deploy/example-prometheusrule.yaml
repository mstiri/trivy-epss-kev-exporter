# EXAMPLE alerting rules — NOT applied by kustomization.yaml. The exporter emits
# no alerts itself; alerting policy lives here, keyed off the metric contract.
# Tune thresholds/severities to your environment before using.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: trivy-epss-kev-exporter-example
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-epss-kev-exporter
    app.kubernetes.io/part-of: trivy
spec:
  groups:
    - name: trivy-vuln.rules
      rules:
        # A known-exploited (CISA KEV) CVE is present on a workload.
        - alert: KnownExploitedVulnPresent
          expr: trivy_vuln_kev == 1
          for: 15m
          labels:
            severity: critical
            source: trivy-epss-kev-exporter
          annotations:
            summary: "KEV CVE {{ $labels.cve }} on {{ $labels.namespace }}/{{ $labels.workload }}"
            description: "{{ $labels.cve }} ({{ $labels.severity }}) in {{ $labels.resource }} is in the CISA KEV catalog."

        # KEV CVE linked to a known ransomware campaign — highest priority.
        - alert: RansomwareKnownExploitedVuln
          expr: trivy_vuln_kev_ransomware == 1
          for: 5m
          labels:
            severity: critical
            source: trivy-epss-kev-exporter
          annotations:
            summary: "Ransomware-linked KEV CVE {{ $labels.cve }} on {{ $labels.namespace }}/{{ $labels.workload }}"

        # High predicted exploitation probability (EPSS score over threshold).
        - alert: HighEPSSScore
          expr: trivy_vuln_epss_score > 0.5
          for: 1h
          labels:
            severity: warning
            source: trivy-epss-kev-exporter
          annotations:
            summary: "High EPSS ({{ $value | humanize }}) for {{ $labels.cve }} on {{ $labels.namespace }}/{{ $labels.workload }}"

        # Top-percentile EPSS (most-likely-exploited tail), threshold-independent.
        - alert: HighEPSSPercentile
          expr: trivy_vuln_epss_percentile > 0.95
          for: 1h
          labels:
            severity: warning
            source: trivy-epss-kev-exporter
          annotations:
            summary: "Top-5% EPSS for {{ $labels.cve }} on {{ $labels.namespace }}/{{ $labels.workload }}"

    - name: trivy-exporter.operational.rules
      rules:
        # A feed has not refreshed successfully in too long → enrichment is stale.
        - alert: ExporterFeedStale
          expr: time() - trivy_exporter_feed_last_success_timestamp_seconds > 36 * 3600
          for: 30m
          labels:
            severity: warning
            source: trivy-epss-kev-exporter
          annotations:
            summary: "EPSS/KEV feed '{{ $labels.feed }}' has not refreshed in over 36h"

        # The informer cache never synced → vuln series may be missing/incomplete.
        - alert: ExporterCacheNotSynced
          expr: trivy_exporter_cache_synced == 0
          for: 15m
          labels:
            severity: warning
            source: trivy-epss-kev-exporter
          annotations:
            summary: "trivy-epss-kev-exporter informer cache is not synced"
