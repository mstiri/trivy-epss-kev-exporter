apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources target the trivy-system namespace (where trivy-operator runs).
# Change here if you deploy elsewhere; the ClusterRoleBinding subject namespace
# is updated to match.
namespace: trivy-system

resources:
  - rbac.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml

images:
  - name: ghcr.io/mstiri/trivy-epss-kev-exporter
    newTag: "v0.1.0"
