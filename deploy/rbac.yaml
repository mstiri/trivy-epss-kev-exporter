apiVersion: v1
kind: ServiceAccount
metadata:
  name: trivy-epss-kev-exporter
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-epss-kev-exporter
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: trivy
---
# Read-only cluster access. There are NO write verbs anywhere — this is an
# exporter, not an operator.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trivy-epss-kev-exporter
  labels:
    app.kubernetes.io/name: trivy-epss-kev-exporter
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: trivy
rules:
  # The source-of-truth CRD we watch and enrich.
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports"]
    verbs: ["get", "list", "watch"]
  # ReplicaSets are read ONLY to roll workloads up to their owning Deployment
  # (--enable-rollup). Remove this rule if you run with --enable-rollup=false.
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trivy-epss-kev-exporter
  labels:
    app.kubernetes.io/name: trivy-epss-kev-exporter
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: trivy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trivy-epss-kev-exporter
subjects:
  - kind: ServiceAccount
    name: trivy-epss-kev-exporter
    namespace: trivy-system
