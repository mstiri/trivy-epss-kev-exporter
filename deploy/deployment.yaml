apiVersion: apps/v1
kind: Deployment
metadata:
  name: trivy-epss-kev-exporter
  namespace: trivy-system
  labels:
    app.kubernetes.io/name: trivy-epss-kev-exporter
    app.kubernetes.io/component: exporter
    app.kubernetes.io/part-of: trivy
spec:
  # Single replica: read-only, stateless, fast restart recovery, non-time-critical
  # data. HA headroom isn't worth duplicate-series complexity.
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: trivy-epss-kev-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trivy-epss-kev-exporter
        app.kubernetes.io/component: exporter
        app.kubernetes.io/part-of: trivy
    spec:
      serviceAccountName: trivy-epss-kev-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: exporter
          image: ghcr.io/mstiri/trivy-epss-kev-exporter:latest
          args:
            - --metrics-port=8080
            - --log-level=info
            - --kev-feed-url=https://raw.githubusercontent.com/cisagov/kev-data/refs/heads/develop/known_exploited_vulnerabilities.json
            # - --namespaces=ns1,ns2          # restrict to an allowlist (default: all)
            # - --enable-rollup=true           # ReplicaSet -> Deployment workload labels
            # - --enable-ransomware=true       # emit trivy_vuln_kev_ransomware
            # - --feed-refresh-interval=24h
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            # The EPSS map holds ~285k CVEs (~30-50 MB resident) — this is not a
            # "few MB" workload; size accordingly.
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            # Not ready until the informer cache has synced AND both feeds have
            # loaded once; the first EPSS download+parse can take a few seconds.
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem is true; give the process a writable scratch dir.
        - name: tmp
          emptyDir: {}
